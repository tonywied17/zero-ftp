<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Zero Transfer SDK logo">
  <title>Zero Transfer SDK</title>

  <defs>
    <!-- Brand gradient: cyan -> violet -->
    <linearGradient id="zt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <linearGradient id="zt-grad-soft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0.35"/>
    </linearGradient>

    <radialGradient id="zt-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6366F1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>

    <!-- Path the data packets travel along: a stylized Z -->
    <path id="zt-z-path"
          d="M 76 84 L 180 84 L 76 172 L 180 172"
          fill="none"/>

    <filter id="zt-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- Soft ambient glow -->
  <circle cx="128" cy="128" r="110" fill="url(#zt-glow)">
    <animate attributeName="r" values="104;116;104" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer ring -->
  <g transform="translate(128 128)">
    <circle r="100" fill="none" stroke="url(#zt-grad-soft)" stroke-width="2"/>
    <!-- Rotating dashed accent ring -->
    <circle r="100" fill="none" stroke="url(#zt-grad)" stroke-width="2"
            stroke-linecap="round"
            stroke-dasharray="6 18 28 14 10 22"
            opacity="0.85">
      <animateTransform attributeName="transform" type="rotate"
                        from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </circle>
    <!-- Counter-rotating inner ring -->
    <circle r="86" fill="none" stroke="url(#zt-grad)" stroke-width="1.25"
            stroke-dasharray="2 10" opacity="0.55">
      <animateTransform attributeName="transform" type="rotate"
                        from="360" to="0" dur="22s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Glow copy of the Z stroke -->
  <use href="#zt-z-path" stroke="url(#zt-grad)" stroke-width="14"
       stroke-linecap="round" stroke-linejoin="round"
       opacity="0.45" filter="url(#zt-blur)"/>

  <!-- Main Z stroke with animated draw-in -->
  <use href="#zt-z-path" stroke="url(#zt-grad)" stroke-width="10"
       stroke-linecap="round" stroke-linejoin="round"
       stroke-dasharray="320" stroke-dashoffset="320">
    <animate attributeName="stroke-dashoffset"
             values="320;0;0;320"
             keyTimes="0;0.35;0.85;1"
             dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
             values="0;1;1;0"
             keyTimes="0;0.1;0.85;1"
             dur="5s" repeatCount="indefinite"/>
  </use>

  <!-- Endpoint nodes -->
  <g fill="#0EA5E9">
    <circle cx="76"  cy="84"  r="6">
      <animate attributeName="r" values="5;7.5;5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="172" r="6" fill="#A855F7">
      <animate attributeName="r" values="5;7.5;5" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Data packets traveling the Z path -->
  <g>
    <circle r="3.2" fill="#E0F2FE">
      <animateMotion dur="2.6s" repeatCount="indefinite" rotate="auto">
        <mpath href="#zt-z-path"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.4" fill="#C7D2FE">
      <animateMotion dur="2.6s" begin="0.65s" repeatCount="indefinite" rotate="auto">
        <mpath href="#zt-z-path"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.6s" begin="0.65s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#F5D0FE">
      <animateMotion dur="2.6s" begin="1.3s" repeatCount="indefinite" rotate="auto">
        <mpath href="#zt-z-path"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.4" fill="#A5F3FC">
      <animateMotion dur="2.6s" begin="1.95s" repeatCount="indefinite" rotate="auto">
        <mpath href="#zt-z-path"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.6s" begin="1.95s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
